version: '3.8'

services:
  api:
    build:
      context: .
      target: api-dev
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Forces tsx/chokidar to use polling to detect file changes on Windows hosts
      - PORT=3333
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json

  web:
    build:
      context: .
      target: web-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    develop:
      watch:
        - action: sync
          path: ./html
          target: /app/html
        - action: sync
          path: ./css
          target: /app/css
        - action: sync
          path: ./assets
          target: /app/assets
        - action: sync
          path: ./main.js
          target: /app/main.js
        - action: sync
          path: ./index.html
          target: /app/index.html
        - action: rebuild
          path: package.json
