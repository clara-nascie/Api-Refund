<!-- ================== TELA DE CADASTRO (SIGN UP) ================== -->
<section id="view-signup" class="auth-container hidden">
  <div class="auth-card">
    <div class="auth-header">
      <img src="/assets/logo.svg" alt="Logo Refund" class="logo">
    </div>
    
    <form id="signup-form" class="auth-form">
      <div class="input-group">
        <label for="signup-name">NOME</label>
        <div class="input-wrapper">
          <input type="text" id="signup-name" placeholder="Seu nome completo" required>
        </div>
      </div>

      <div class="input-group">
        <label for="signup-email">E-MAIL</label>
        <div class="input-wrapper">
          <input type="email" id="signup-email" placeholder="exemplo@email.com" required>
        </div>
      </div>
      
      <div class="input-group">
        <label for="signup-password">SENHA</label>
        <div class="input-wrapper">
          <input type="password" id="signup-password" placeholder="Crie uma senha" required>
        </div>
      </div>

      <div class="input-group">
        <label for="signup-confirm-password">CONFIRME A SENHA</label>
        <div class="input-wrapper">
          <input type="password" id="signup-confirm-password" placeholder="Repita a senha" required>
        </div>
      </div>
      
      <button type="submit" class="btn-primary" id="btn-signup">Cadastrar</button>
    </form>
    
    <a href="#" class="auth-link" id="link-goto-signin">Já tenho uma conta</a>
  </div>
</section>
