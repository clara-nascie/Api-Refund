<section id="view-confirmation" class="dashboard-container hidden">
  <header class="dashboard-header">
    <img src="/assets/logo.svg" alt="Logo Refund" class="logo-sm">
    <div class="user-profile">
      <img src="/assets/avatar.png" alt="Avatar Rodrigo" class="user-avatar">
      <span class="user-name" id="confirmation-user-name">Rodrigo</span>
      <button class="btn-logout" id="btn-confirmation-logout">
        <i class="ph ph-sign-out"></i>
      </button>
    </div>
  </header>

  <main class="dashboard-main flex-center">
    <div class="success-card">
      <div class="success-icon">
        <i class="ph ph-check-circle"></i>
      </div>
      <h2>Solicitação enviada!</h2>
      <p>Agora é apenas aguardar! Sua solicitação será analisada e, em breve, o setor financeiro irá entrar em contato com você.</p>
      <button class="btn-primary" id="btn-new-request">Nova solicitação</button>
    </div>
  </main>
</section>
