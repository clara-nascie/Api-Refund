<!-- ================== TELA DE LOGIN (SIGN IN) ================== -->
<section id="view-signin" class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="/assets/logo.svg" alt="Logo Refund" class="logo">
    </div>
    
    <form id="signin-form" class="auth-form">
      <div class="input-group">
        <label for="signin-email">E-MAIL</label>
        <div class="input-wrapper">
          <input type="email" id="signin-email" placeholder="exemplo@email.com" required>
        </div>
      </div>
      
      <div class="input-group">
        <label for="signin-password">SENHA</label>
        <div class="input-wrapper">
          <input type="password" id="signin-password" placeholder="Sua senha" required>
        </div>
      </div>
      
      <button type="submit" class="btn-primary" id="btn-signin">Entrar</button>
    </form>
    
    <a href="#" class="auth-link" id="link-goto-signup">Criar conta</a>
    
    <div class="demo-accounts">
      <p><strong>Contas de Teste:</strong></p>
      <p>Colaborador: <code>colaborador@email.com</code> (senha: 123)</p>
      <p>Gestor: <code>gestor@email.com</code> (senha: 123)</p>
    </div>
  </div>
</section>
